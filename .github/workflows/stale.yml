name: 'Close stale issues and PRs'
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  actions: write
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        name: 'Stale Issues'
        with:
          stale-issue-message: 'This issue has been marked as stale. Please reply to the issue or the issue will be automatically closed in 3 days.'
          close-issue-message: |
            This issue has been closed as there has been no recent activity after being marked as stale.

            We don't monitor closed issues, if you think this is still unresolved and **have more information**, please open a new issue.
          days-before-stale: 4
          days-before-close: 3
          days-before-pr-close: -1
          stale-issue-label: 'state: Stale'
          only-issue-labels: 'state: Awaiting Reply'
          exempt-issue-labels: 'prio: High'
          operations-per-run: 100
          # exempt-all-issue-assignees: true

      # Stale mod issues    
      - uses: actions/stale@v10
        name: Stale Mod Issue
        with:
          stale-issue-message: '@Gaz492 @Saereth Please check if the mod has recieved an update, if there has been no mod updates this issue will close in 24 hours'
          close-issue-message: |
            Closing issue as there has been no updates to the mod, if the mod receives an update it will be included in a future pack update

            Please note we do not monitor closed issues.
          days-before-stale: 59
          days-before-close: 1
          days-before-pr-close: -1
          stale-issue-label: 'state: Stale'
          any-of-issue-labels: 'state: Reported to Mod Dev, state: Awaiting Mod Update'
          exempt-issue-labels: 'state: Mod Update Available,In Progress'
          operations-per-run: 100
          ignore-issue-updates: false

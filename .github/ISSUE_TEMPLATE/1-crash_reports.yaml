name: 'Crash Report'
description: 'Use this form if you are running into any crashes or disconnects'
labels:
  - 'type: Crash/Disconnect'
type: 'Bug'
body:
  - type: 'markdown'
    attributes:
      value: '## Please Read the following

        - If you are having issues with a specific mod, we recommend reporting
        the issue directly to the mod author

        - Only 1 issue per bug report, if you need to report multiple issues,
        open multiple bug reports

        ## Common solutions

        - Updating the pack to the latest available version

        - If you have added/updated/removed any mods, either undo the changes or
        install a second unmodified copy of the modpack and test if the issue
        still happens'
  - type: 'dropdown'
    id: 'triedSolutions'
    attributes:
      label: 'Have you tried the solutions mentioned above? '
      options:
        - 'No'
        - 'Yes'
    validations:
      required: true
  - type: 'dropdown'
    id: 'ftb-modpack-dropdown'
    attributes:
      label: 'Modpack'
      description: 'What modpack are you having an issue with?'
      options:
        - 'FTB Unstable 6'
        - 'FTB StoneBlock 4'
        - 'FTB Skies 2'
        - 'FTB OceanBlock 2'
        - 'FTB Presents Direwolf20 1.21'
        - 'FTB Evolution'
        - 'FTB NeoTech'
        - 'FTB Builders Paradise 2'
        - 'FTB Skies Expert'
        - 'FTB Arcanum Institute'
        - 'FTB Interactions Remastered'
        - 'FTB Skies'
        - 'FTB StoneBlock 3'
        - 'Other...'
    validations:
      required: true
  - type: 'markdown'
    attributes:
      value: "> [!IMPORTANT] \ 

        > Only modpacks within our active support lifecycle are supported. If
        your modpack is not listed in the dropdown below, it may no longer be
        supported and the issue may closed.

        >

        > If there is a critical bug/exploit in an older pack and you wish to
        report it please select 'Other...' and name the modpack in the bug
        description\n"
  - type: 'input'
    id: 'modpack-version'
    attributes:
      label: 'Modpack Version'
      description: 'The modpack version can often be found on the launcher you are using'
      placeholder: 'e.g. 1.1.5'
    validations:
      required: true
  - type: 'input'
    id: 'launcher'
    attributes:
      label: 'Launcher/App used to start the modpack'
      description: 'What is the name of the launcher/app you are using to start the
        modpack?'
      placeholder: 'e.g. FTB App/CurseForge/Prism'
    validations:
      required: true
  - type: 'textarea'
    id: 'bug-desc'
    attributes:
      label: 'Describe what happened'
      description: 'A clear and concise description of what the bug is along with any
        screenshots that can help explain the issue'
    validations:
      required: true
  - type: 'textarea'
    id: 'logs'
    attributes:
      label: 'Link to logs'
      description: 'Please upload your logs to a pastebin service such as
        [Gist](https://gist.github.com/), [mclo.gs](https://mclo.gs/) and link
        them here. If you are not sure which logs to upload, please upload the
        debug.log file from the modpack folder.'
    validations:
      required: true
  - type: 'markdown'
    attributes:
      value: "> [!IMPORTANT] \ 

        > **Logs are required**, A guide on finding modpack logs can be found at
        https://docs.feed-the-beast.com/docs/support/Troubleshooting/modpack-lo\
        gs

        >

        > If no logs are provided, your issue may be closed\n"
  - type: 'textarea'
    id: 'reproduce'
    attributes:
      label: 'Steps to reproduce'
      description: 'If you are able to reproduce the issue, please provide a step by
        step guide on how we can try and reproduce the issue.'
      placeholder: '1. Go to ...

        2. Click on ...

        3. Scroll down to ...

        4. See error'
  - type: 'textarea'
    id: 'additional-info'
    attributes:
      label: 'Additional information'
      description: 'Any other information that may help debug the issue. If you
        have         modified the modpack please let us know what was changed
        here'
      placeholder: 'Any other information that may help debug the issue. If you
        have         modified the modpack please let us know what was changed
        here'
  - type: 'dropdown'
    id: 'modded-dropdown'
    attributes:
      label: 'Has the pack been modified'
      description: 'Have you modified the modpack in any way? This includes changing
        configs, adding mods and/or updating any mods'
      options:
        - 'Please select an option...'
        - 'Yes'
        - 'No'
    validations:
      required: true
  - type: 'textarea'
    id: 'additional'
    attributes:
      label: 'Additional information'
      description: 'Any other information that can help with debugging the issue'
      placeholder: 'Any other information that may help debug the issue. If you have
        modified the modpack please let us know what was changed here'
